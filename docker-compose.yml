services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gocrawler
      POSTGRES_PASSWORD: gocrawler
      POSTGRES_DB: gocrawler
    ports:
      # 15432:本機已有原生 PostgreSQL 佔用 5432,避免衝突
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
